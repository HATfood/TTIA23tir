        const { useState, useEffect, useRef } = React;

        // Utility helper to convert numbers to Persian digits
        const toPersianDigits = (num) => {
            if (num === null || num === undefined) return '';
            const id = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return num.toString().replace(/[0-9]/g, (w) => id[+w]);

        function InteractiveNetworkGraph({ isExpanded, toggleExpand }) {
            const canvasRef = useRef(null);
            const animationRef = useRef(null);
            const [nodes, setNodes] = useState([]);
            const draggedNodeRef = useRef(null);
            const mouseRef = useRef({ x: 0, y: 0 });

            // Initialize Nodes with larger parameters & longer connection springs
            useEffect(() => {
                const width = isExpanded ? window.innerWidth * 0.9 : 680;
                const height = isExpanded ? window.innerHeight * 0.8 : 340; // Balanced height to fit perfectly in 1200p
                const centerX = width / 2;
                const centerY = height / 2;

                const centerNode = {
                    id: 'center',
                    x: centerX,
                    y: centerY,
                    vx: 0,
                    vy: 0,
                    radius: 72, // Substantially enlarged central node
                    isCenter: true,
                    label: 'انجمن چای',
                    imgSrc: 'ttialogo.png',
                    img: null
                };

                const loadedCenterImg = new Image();
                loadedCenterImg.src = centerNode.imgSrc;
                loadedCenterImg.onload = () => { centerNode.img = loadedCenterImg; };

                // Satellite Nodes representing the 13 members with larger radii and wider initial offsets
                const satelliteNodes = Array.from({ length: 13 }, (_, i) => {
                    const id = i + 1;
                    const angle = (i / 13) * Math.PI * 2;
                    const distance = 200; // Significantly lengthened spring connection distance for projector
                    const satNode = {
                        id: `A${id}`,
                        x: centerX + Math.cos(angle) * distance,
                        y: centerY + Math.sin(angle) * distance,
                        vx: 0,
                        vy: 0,
                        radius: 32, // Enormously styled satellite nodes
                        isCenter: false,
                        label: `A${id}`,
                        imgSrc: `A${id}.png`,
                        img: null
                    };

                    const img = new Image();
                    img.src = satNode.imgSrc;
                    img.onload = () => { satNode.img = img; };
                    satNode.img = img;

                    return satNode;
                });

                setNodes([centerNode, ...satelliteNodes]);
            }, [isExpanded]);

            // Physics Animation Loop
            useEffect(() => {
                if (nodes.length === 0) return;

                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');

                const updatePhysicsAndRender = () => {
                    const width = canvas.width;
                    const height = canvas.height;
                    const centerX = width / 2;
                    const centerY = height / 2;

                    ctx.clearRect(0, 0, width, height);

                    const kSpring = 0.04; 
                    const restLength = 190; // Longer edges (یال‌ها)
                    const damping = 0.82;
                    const repulsionK = 1500; // Greater repulsion to accommodate larger node sizes

                    const centerNode = nodes.find(n => n.isCenter);
                    if (centerNode && draggedNodeRef.current !== centerNode) {
                        centerNode.vx += (centerX - centerNode.x) * 0.04;
                        centerNode.vy += (centerY - centerNode.y) * 0.04;
                        centerNode.x += centerNode.vx;
                        centerNode.y += centerNode.vy;
                        centerNode.vx *= damping;
                        centerNode.vy *= damping;
                    }

                    // Apply Forces
                    for (let i = 0; i < nodes.length; i++) {
                        const n1 = nodes[i];
                        if (n1.isCenter) continue;

                        if (draggedNodeRef.current === n1) {
                            n1.x = mouseRef.current.x;
                            n1.y = mouseRef.current.y;
                            n1.vx = 0;
                            n1.vy = 0;
                            continue;
                        }

                        // Attraction to central node
                        if (centerNode) {
                            const dx = centerNode.x - n1.x;
                            const dy = centerNode.y - n1.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            const force = (dist - restLength) * kSpring;
                            n1.vx += (dx / dist) * force;
                            n1.vy += (dy / dist) * force;
                        }

                        // Mutual Repulsion
                        for (let j = 0; j < nodes.length; j++) {
                            if (i === j) continue;
                            const n2 = nodes[j];
                            const dx = n1.x - n2.x;
                            const dy = n1.y - n2.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            const minDist = n1.radius + n2.radius + 50;

                            if (dist < minDist) {
                                const force = repulsionK / (dist * dist);
                                n1.vx += (dx / dist) * force;
                                n1.vy += (dy / dist) * force;
                            }
                        }

                        n1.x += n1.vx;
                        n1.y += n1.vy;

                        n1.vx *= damping;
                        n1.vy *= damping;

                        // Wall Collision
                        const margin = n1.radius + 10;
                        if (n1.x < margin) { n1.x = margin; n1.vx *= -0.4; }
                        if (n1.x > width - margin) { n1.x = width - margin; n1.vx *= -0.4; }
                        if (n1.y < margin) { n1.y = margin; n1.vy *= -0.4; }
                        if (n1.y > height - margin) { n1.y = height - margin; n1.vy *= -0.4; }
                    }

                    // Draw spring lines
                    if (centerNode) {
                        nodes.forEach(n => {
                            if (n.isCenter) return;
                            ctx.beginPath();
                            ctx.moveTo(centerNode.x, centerNode.y);
                            ctx.lineTo(n.x, n.y);
                            ctx.strokeStyle = '#C5A059'; 
                            ctx.lineWidth = 3.5; // Thicker lines for excellent visibility
                            ctx.globalAlpha = 0.7;
                            ctx.stroke();
                            ctx.globalAlpha = 1.0;
                        });
                    }

                    // Draw Nodes with completely clean non-clipped circular layouts (Removed circular frame/border as requested)
                    nodes.forEach(node => {
                        ctx.save();

                        if (node.img && node.img.complete && node.img.naturalWidth !== 0) {
                            const size = node.radius * 2;
                            ctx.drawImage(node.img, node.x - node.radius, node.y - node.radius, size, size);
                        } else {
                            ctx.beginPath();
                            ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                            ctx.fillStyle = node.isCenter ? '#2C5E43' : '#FAF6EE';
                            ctx.fill();

                            ctx.fillStyle = node.isCenter ? '#FAF6EE' : '#153222';
                            ctx.font = `bold ${node.isCenter ? 15 : 12}px Vazirmatn`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(node.label, node.x, node.y + 1);
                        }

                        ctx.restore();
                    });

                    animationRef.current = requestAnimationFrame(updatePhysicsAndRender);
                };

                updatePhysicsAndRender();

                return () => {
                    cancelAnimationFrame(animationRef.current);
                };
            }, [nodes]);

            const handleStart = (clientX, clientY) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                for (let i = nodes.length - 1; i >= 0; i--) {
                    const node = nodes[i];
                    const dist = Math.hypot(node.x - x, node.y - y);
                    if (dist < node.radius + 15) {
                        draggedNodeRef.current = node;
                        mouseRef.current = { x, y };
                        break;
                    }
                }
            };

            const handleMove = (clientX, clientY) => {
                if (!draggedNodeRef.current) return;
                const canvas = canvasRef.current;
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                mouseRef.current = {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            };

            const handleEnd = () => {
                draggedNodeRef.current = null;
            };

            return (
                <div className={`relative bg-white border-2 border-goldTea-500/30 rounded-3xl p-1 shadow-inner flex flex-col items-center justify-center ${isExpanded ? 'fixed inset-4 z-[100] bg-tea-50/95 backdrop-blur-md' : 'w-full h-full'}`}>
                    {/* Expand Trigger */}
                    <button 
                        onClick={toggleExpand}
                        className="absolute top-3 left-3 z-20 text-xs bg-goldTea-500 text-white px-3 py-1.5 rounded-xl font-bold hover:bg-goldTea-600 transition shadow-sm flex items-center gap-1.5"
                    >
                        <i className={`fa-solid ${isExpanded ? 'fa-compress' : 'fa-expand'}`}></i>
                        <span>{isExpanded ? 'بستن' : 'بزرگ‌نمایی'}</span>
                    </button>

                    <canvas 
                        ref={canvasRef}
                        width={isExpanded ? window.innerWidth * 0.9 : 680}
                        height={isExpanded ? window.innerHeight * 0.8 : 340}
                        onMouseDown={(e) => handleStart(e.clientX, e.clientY)}
                        onMouseMove={(e) => handleMove(e.clientX, e.clientY)}
                        onMouseUp={handleEnd}
                        onMouseLeave={handleEnd}
                        onTouchStart={(e) => handleStart(e.touches[0].clientX, e.touches[0].clientY)}
                        onTouchMove={(e) => handleMove(e.touches[0].clientX, e.touches[0].clientY)}
                        onTouchEnd={handleEnd}
                        className="bg-tea-50/20 rounded-2xl cursor-grab active:cursor-grabbing"
                    />
                </div>
            );
        }

                                                        <div className="bg-blue-50/50 border-2 border-blue-200 rounded-2xl p-4 flex flex-col justify-between shadow-sm">
                                                            <span className="text-xs font-black text-blue-800 bg-blue-100 px-3 py-1 rounded-lg inline-block w-fit mb-2">{toPersianDigits(2)}. دفتر تدوین مقررات</span>
                                                            <div className="space-y-2">
                                                                <div className="p-3 bg-white border border-blue-200 rounded-xl">
                                                                    <h5 className="font-black text-sm text-tea-800">دفتر تدوین مقررات</h5>
                                                                    <p className="text-xs text-zinc-600 font-bold mt-1">دریافت و ثبت پرونده ارجاعی بازرگانی</p>
                                                                </div>
                                                                <div className="text-center text-blue-500 text-base"><i className="fa-solid fa-arrow-down-long"></i></div>
                                                                <div className="p-3 bg-white border border-blue-200 rounded-xl">
                                                                    <h5 className="font-black text-sm text-tea-800">پایش کارشناسی</h5>
                                                                    <p className="text-xs text-zinc-600 font-bold mt-1">تهیه دستورالعمل شیوه تخصیص ارز چای ملی</p>
                                                                </div>
                                                            </div>
                                                            <span className="text-xs font-black text-blue-700 border-2 border-blue-300 bg-blue-100/50 px-2 py-1 rounded-xl mt-4 text-center block">ارجاع شده به مراجع بالادستی</span>
                                                        </div>

                                                        {/* Step 3 (Gold/Amber Theme) */}
                                                        <div className="bg-amber-50/50 border-2 border-amber-200 rounded-2xl p-4 flex flex-col justify-between shadow-sm">
                                                            <span className="text-xs font-black text-amber-800 bg-amber-100 px-3 py-1 rounded-lg inline-block w-fit mb-2">{toPersianDigits(3)}. بانک مرکزی</span>
                                                            <div className="space-y-2">
                                                                <div className="p-3 bg-white border border-amber-200 rounded-xl">
                                                                    <h5 className="font-black text-sm text-tea-800">معاونت ارزی</h5>
                                                                    <p className="text-xs text-zinc-600 font-bold mt-1">پذیرش اسناد گمرکی و ثبت سفارشات معوقه</p>
                                                                </div>
                                                                <div className="text-center text-amber-500 text-base"><i className="fa-solid fa-arrow-down-long"></i></div>
                                                                <div className="p-3 bg-white border border-amber-200 rounded-xl">
                                                                    <h5 className="font-black text-sm text-tea-800">کارگروه ارزی</h5>
                                                                    <p className="text-xs text-zinc-600 font-bold mt-1">انطباق درخواست‌ها با مقررات ارزی جناب دکتر توکلی</p>
                                                                </div>
                                                            </div>
                                                            <span className="text-xs font-black text-amber-700 border-2 border-amber-300 bg-amber-100/50 px-2 py-1 rounded-xl mt-4 text-center block">در حال بررسی و انطباق فنی</span>
                                                        </div>

                                                        {/* Step 4 (Indigo Theme) */}
                                                        <div className="bg-indigo-50/50 border-2 border-indigo-200 rounded-2xl p-4 flex flex-col justify-between shadow-sm">
                                                            <span className="text-xs font-black text-indigo-800 bg-indigo-100 px-3 py-1 rounded-lg inline-block w-fit mb-2">{toPersianDigits(4)}. وضعیت نهایی پیگیری</span>
                                                            <div className="space-y-2">
                                                                <div className="p-3 bg-white border border-indigo-200 rounded-xl">
                                                                    <h5 className="font-black text-sm text-tea-800">دبیرخانه انجمن چای</h5>
                                                                    <p className="text-xs text-zinc-600 font-bold mt-1">پیگیری حضوری روزانه جهت نهایی‌سازی مصوبه</p>
                                                                </div>
                                                                <div className="text-center text-indigo-500 text-base"><i className="fa-solid fa-arrow-down-long"></i></div>
                                                                <div className="p-3 bg-white border border-indigo-200 rounded-xl">
                                                                    <h5 className="font-black text-sm text-tea-800">جلوگیری از رسوب کالا</h5>
                                                                    <p className="text-xs text-zinc-600 font-bold mt-1">تسهیل ترخیص فوری محموله‌ها در گمرکات جنوبی</p>
                                                                </div>
                                                            </div>
                                                            <span className="text-xs font-black text-indigo-700 border-2 border-indigo-300 bg-indigo-100/50 px-2 py-1 rounded-xl mt-4 text-center block">
                                                                <i className="fa-solid fa-spinner animate-spin ml-1 text-[10px]"></i> در حال پیگیری مداوم
                                                            </span>
                                                        </div>

                                                    </div>

                                                    {/* Descriptive Summary of Ceylon instruction */}
                                                    <div className="p-3 bg-goldTea-500/10 rounded-xl border border-goldTea-500/30 text-right shrink-0">
                                                        <span className="font-black text-xs block text-goldTea-700 mb-0.5"><i className="fa-solid fa-circle-info"></i> هدف اصلی این دستورالعمل ابلاغی:</span>
                                                        <p className="text-[11px] text-tea-900 leading-relaxed font-bold">
                                                            روان‌سازی ثبت درخواست‌های معوقه تخصیص ارز به روش نوین و خارج از محدودیت تالار ارزی سیلان (به شیوه ثبت درخواست تخصیص ارز چای ملی) جهت جلوگیری از رسوب محموله‌ها در گمرکات.
                                                        </p>
                                                    </div>

                                                </div>

                                            </div>
                                        )}

                                    </div>
                                ) : (
                                    /* STANDARD SLIDE GENERATION FOR OTHER INDEXES */
                                    slides[currentSlide].content
                                )}

                            </div>

                        </div>
                    </main>

                    {/* PRESENTATION PROGRESS BAR */}
                    <div className="w-full bg-white border-t-4 border-goldTea-500 px-6 py-4 flex flex-col md:flex-row gap-3 justify-between items-center z-50 shadow-inner h-24 shrink-0">
                        {/* Slide Progress */}
                        <div className="w-full md:w-1/3 flex items-center gap-3">
                            <span className="text-xs md:text-sm text-tea-800 font-black whitespace-nowrap">پیشرفت ارائه:</span>
                            <div className="flex-grow h-2.5 bg-tea-100 rounded-full overflow-hidden">
                                <div 
                                    className="h-full bg-goldTea-500 transition-all duration-300"
                                    style={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }}
                                ></div>
                            </div>
                        </div>

                        {/* Interactive Page Controllers (RTL Aligned Correctly) */}
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={prevSlide}
                                disabled={currentSlide === 0}
                                className={`px-5 py-2.5 rounded-2xl font-black text-sm md:text-base flex items-center gap-2 transition-all ${
                                    currentSlide === 0 
                                        ? 'bg-tea-50 text-tea-200 border border-transparent cursor-not-allowed' 
                                        : 'bg-goldTea-100 hover:bg-goldTea-500 hover:text-white text-goldTea-700 shadow-sm'
                                }`}
                            >
                                <i className="fa-solid fa-arrow-right text-xs"></i>
                                <span>اسلاید قبلی</span>
                            </button>

                            <button 
                                onClick={nextSlide}
                                disabled={currentSlide === slides.length - 1}
                                className={`px-5 py-2.5 rounded-2xl font-black text-sm md:text-base flex items-center gap-2 transition-all ${
                                    currentSlide === slides.length - 1 
                                        ? 'bg-tea-50 text-tea-200 border border-transparent cursor-not-allowed' 
                                        : 'bg-tea-500 hover:bg-tea-800 text-white shadow-sm'
                                }`}
                            >
                                <span>اسلاید بعدی</span>
                                <i className="fa-solid fa-arrow-left text-xs"></i>
                            </button>
                        </div>

                        <div className="hidden md:flex items-center gap-2 text-xs text-tea-500 font-bold">
                            <kbd className="bg-tea-50 px-2 py-0.5 rounded-lg border-2 border-goldTea-500/20 font-black">→</kbd>
                            <span>و</span>
                            <kbd className="bg-tea-50 px-2 py-0.5 rounded-lg border-2 border-goldTea-500/20 font-black">←</kbd>
                            <span>ورق زدن اسلایدها</span>
                        </div>
                    </div>

                    {/* INTERACTIVE FULL-SCREEN LISTS OVERLAY MODAL */}
                    {activeListModal && (
                        <div className="fixed inset-0 bg-tea-900/60 backdrop-blur-md flex items-center justify-center z-[110] p-4 animate-fadeIn">
                            <div className="bg-white border-4 border-goldTea-500 rounded-[32px] w-full max-w-4xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
                                
                                {/* Modal Header */}
                                <div className="bg-tea-500 text-white p-5 flex justify-between items-center border-b-4 border-goldTea-500 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <i className={`fa-solid ${modalData[activeListModal].icon} text-goldTea-500 text-2xl`}></i>
                                        <h3 className="text-lg md:text-xl font-[900] text-white">{modalData[activeListModal].title}</h3>
                                    </div>
                                    <button 
                                        onClick={() => setActiveListModal(null)}
                                        className="bg-goldTea-500 hover:bg-goldTea-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-black transition-all shadow-md shrink-0"
                                    >
                                        <i className="fa-solid fa-times text-lg"></i>
                                    </button>
                                </div>

                                {/* Scrollable List Panel */}
                                <div className="p-6 overflow-y-auto bg-tea-50 flex-grow no-scrollbar">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {modalData[activeListModal].items.map((item, index) => (
                                            <div key={index} className="bg-white p-4 rounded-2xl border border-goldTea-500/20 shadow-sm flex items-start gap-4 hover:border-goldTea-500 transition-colors">
                                                <span className="w-8 h-8 rounded-xl bg-tea-500 text-white flex items-center justify-center font-black text-sm shrink-0 shadow-sm">
                                                    {toPersianDigits(index + 1)}
                                                </span>
                                                <p className="text-sm md:text-base font-bold text-tea-800 leading-relaxed text-right">{item}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Modal Footer */}
                                <div className="p-4 bg-white border-t border-tea-100 flex justify-end shrink-0">
                                    <button 
                                        onClick={() => setActiveListModal(null)}
                                        className="bg-tea-800 hover:bg-tea-900 text-white font-black px-6 py-2.5 rounded-2xl transition-all shadow-md"
                                    >
                                        بستن پنجره
                                    </button>
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
